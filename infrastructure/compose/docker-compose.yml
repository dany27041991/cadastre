# =============================================================================
# Municipal Arboreal Cadastre - Base stack
# =============================================================================
# Services: postgis, init (once), backend, frontend.
# - Schema + seeds: created on first start via docker-entrypoint-initdb.d (sql only).
# - Admin boundaries (regions, provinces, municipalities, sections, submunicipal):
#   populated by init service after postgis is healthy (run-init.sh).
# - Redis/PgBouncer/ClickHouse/PgAdmin removed; add back if needed.
# =============================================================================

name: catasto-arboreo-platform

services:
  # ---------------------------------------------------------------------------
  # 1. PostgreSQL + PostGIS
  # ---------------------------------------------------------------------------
  postgis:
    image: postgis/postgis:16-3.4
    container_name: catasto-postgis
    restart: unless-stopped
    shm_size: '4gb'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arboreal_green_cadastre}
      POSTGRES_USER: ${POSTGRES_USER:-cadastre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - work_mem=128MB
      - -c
      - maintenance_work_mem=512MB
      - -c
      - effective_cache_size=2GB
      - -c
      - max_parallel_workers_per_gather=4
      - -c
      - max_parallel_workers=8
      - -c
      - random_page_cost=1.1
      - -c
      - max_connections=200
      - -c
      - max_locks_per_transaction=256
      - -c
      - autovacuum_max_workers=5
      - -c
      - autovacuum_vacuum_cost_limit=1000
      - -c
      - autovacuum_vacuum_cost_delay=1
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ../scripts/init/postgis/sql:/docker-entrypoint-initdb.d:ro
      - ../data:/data:ro
    networks:
      - catasto-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-cadastre} -d $${POSTGRES_DB:-arboreal_green_cadastre} || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ---------------------------------------------------------------------------
  # 2. Init - schema + cadastre + admin boundaries (run once after postgis)
  # ---------------------------------------------------------------------------
  init:
    build:
      context: ../../backend
      dockerfile: Dockerfile.standalone
      args:
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    container_name: catasto-init
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cadastre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-arboreal_green_cadastre}
      # Python loaders (load_geojson.py) use DATABASE_URL
      DATABASE_URL: postgresql://${POSTGRES_USER:-cadastre}:${POSTGRES_PASSWORD}@postgis:5432/${POSTGRES_DB:-arboreal_green_cadastre}
    volumes:
      - ../scripts:/scripts:ro
      - ../data:/data:ro
    command: ["sh", "/scripts/init/postgis/run-init.sh"]
    depends_on:
      postgis:
        condition: service_healthy
    extra_hosts:
      - "nexus3-cdp.apps.dxccdp-svil.ocp.mase.priv:10.64.28.36"
      - "console-cdp.apps.dxccdp-svil.ocp.mase.priv:10.64.28.36"
      - "sim-dev.mase.gov.it:198.18.12.135"
      - "sim-coll.mase.gov.it:4.232.112.87"
    networks:
      - catasto-network

  # ---------------------------------------------------------------------------
  # 3. Backend API - FastAPI
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile.standalone
      args:
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    container_name: catasto-backend
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgis
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-cadastre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-arboreal_green_cadastre}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-placeholder-do-not-use-in-production}
      JWT_ALGORITHM: HS256
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      APP_ENV: ${APP_ENV:-development}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Rome}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ADMIN_AREAS_CACHE_TTL_SECONDS: ${ADMIN_AREAS_CACHE_TTL_SECONDS:-86400}
      # Auth (mase-utils-secu): AUTH_ENABLED=false disabilita; true + JWT_URI + MASE_API_* abilita
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      JWT_URI: ${JWT_URI:-}
      MASE_API_AUTHENTICATION: ${MASE_API_AUTHENTICATION:-}
      MASE_API_IAM: ${MASE_API_IAM:-}
      MASE_SECU_SSL_VERIFY: ${MASE_SECU_SSL_VERIFY:-true}
      # Debug: DEBUGPY_ENABLE=1 per attach IDE su porta 5678 (Python debugpy)
      DEBUGPY_ENABLE: ${DEBUGPY_ENABLE:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
      - "${BACKEND_DEBUG_PORT:-5678}:5678"
    volumes:
      - ../../backend:/app
      - ../scripts:/scripts:ro
      - ../data:/data
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgis:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    extra_hosts:
      - "nexus3-cdp.apps.dxccdp-svil.ocp.mase.priv:10.64.28.36"
      - "console-cdp.apps.dxccdp-svil.ocp.mase.priv:10.64.28.36"
      - "sim-dev.mase.gov.it:198.18.12.135"
      - "sim-coll.mase.gov.it:4.232.112.87"
    networks:
      - catasto-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # 4. Frontend - React + Vite + OpenLayers + OSM (standalone)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.standalone
    container_name: catasto-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      # Utenza mockata in standalone (opzionale): FGP, utente JSON, cookie header
      VITE_MOCK_FGP: ${VITE_MOCK_FGP:-}
      VITE_MOCK_USER: ${VITE_MOCK_USER:-}
      VITE_MOCK_COOKIE: ${VITE_MOCK_COOKIE:-}
      # Debug: NODE_OPTIONS=--inspect per attach IDE su porta 9229 (Node inspector)
      NODE_OPTIONS: ${NODE_OPTIONS:-}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
      - "${FRONTEND_DEBUG_PORT:-9229}:9229"
    volumes:
      - ../../frontend/src:/app/src
      - ../../frontend/index.html:/app/index.html
      - ../../frontend/vite.config.ts:/app/vite.config.ts
      - ../../frontend/tsconfig.json:/app/tsconfig.json
      - ../../frontend/tsconfig.node.json:/app/tsconfig.node.json
    depends_on:
      - backend
    networks:
      - catasto-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

# =============================================================================
# Persistent volumes
# =============================================================================
volumes:
  postgis_data:

# =============================================================================
# Network
# =============================================================================
networks:
  catasto-network:
    driver: bridge
    name: catasto-arboreo-network
